<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NEXUS-MD | Session Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #080E1A;
      font-family: 'Inter', sans-serif;
      color: #C8D8E8;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 2.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #5EEAD4;
    }

    .dot-live {
      width: 6px; height: 6px;
      background: #22C55E;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50% { opacity: .8; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    .hero {
      text-align: center;
    }

    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3.2rem, 9vw, 6rem);
      font-weight: 800;
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 0.8rem;
    }

    .hero h1 span.n { color: #F59E0B; }
    .hero h1 span.m { color: #5EEAD4; }

    .hero p {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(200,216,232,0.4);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      width: 100%;
      max-width: 780px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      overflow: hidden;
    }

    .stat {
      background: rgba(8,14,26,0.9);
      padding: 1.8rem 1rem;
      text-align: center;
      transition: background .3s;
    }

    .stat:hover { background: rgba(255,255,255,0.03); }

    .stat-n {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.7rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .stat-l {
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(200,216,232,0.35);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      width: 100%;
      max-width: 780px;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 1.8rem 1.6rem;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      transition: all .35s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--h, rgba(245,158,11,0.06));
      opacity: 0;
      transition: opacity .35s;
      border-radius: 18px;
    }

    .btn:hover::after { opacity: 1; }

    .btn:hover {
      border-color: var(--b, rgba(245,158,11,0.3));
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }

    .btn.a { --h: rgba(245,158,11,0.06); --b: rgba(245,158,11,0.35); }
    .btn.b { --h: rgba(94,234,212,0.06); --b: rgba(94,234,212,0.35); }
    .btn.c { --h: rgba(167,139,250,0.06); --b: rgba(167,139,250,0.3); }

    .btn-ic {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      position: relative;
      z-index: 1;
    }

    .btn.a .btn-ic { background: rgba(245,158,11,0.1); color: #F59E0B; }
    .btn.b .btn-ic { background: rgba(94,234,212,0.1); color: #5EEAD4; }
    .btn.c .btn-ic { background: rgba(167,139,250,0.1); color: #A78BFA; }

    .btn-txt { position: relative; z-index: 1; }

    .btn-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 3px;
    }

    .btn-desc {
      font-size: 0.75rem;
      color: rgba(200,216,232,0.4);
      line-height: 1.4;
    }

    .foot {
      font-size: 0.72rem;
      color: rgba(200,216,232,0.25);
      letter-spacing: 1px;
    }

    .foot span { color: rgba(200,216,232,0.5); }

    @media (max-width: 680px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .actions { grid-template-columns: 1fr; }
      .hero h1 { font-size: 3rem; }
    }

    @media (max-width: 380px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .stat { padding: 1.2rem 0.7rem; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="wrap">

    <div class="badge">
      <span class="dot-live"></span>
      <span id="srv">All Systems Online</span>
    </div>

    <div class="hero">
      <h1><span class="n">NEXUS</span><span class="m">-MD</span></h1>
      <p>WhatsApp Session Generator</p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-n" id="s1">--</div>
        <div class="stat-l">Total Sessions</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s2">--</div>
        <div class="stat-l">Today</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s3">--%</div>
        <div class="stat-l">Success Rate</div>
      </div>
      <div class="stat">
        <div class="stat-n" id="s4">--</div>
        <div class="stat-l">Countries</div>
      </div>
    </div>

    <div class="actions">
      <a href="/pair" class="btn a">
        <div class="btn-ic"><i class="fas fa-mobile-alt"></i></div>
        <div class="btn-txt">
          <div class="btn-title">Pair Code</div>
          <div class="btn-desc">Connect with your phone number</div>
        </div>
      </a>
      <a href="/qr" target="_blank" class="btn b">
        <div class="btn-ic"><i class="fas fa-qrcode"></i></div>
        <div class="btn-txt">
          <div class="btn-title">QR Scan</div>
          <div class="btn-desc">Scan QR code to connect</div>
        </div>
      </a>
      <a href="https://github.com/vinpink2/JUNE-X" target="_blank" class="btn c">
        <div class="btn-ic"><i class="fab fa-github"></i></div>
        <div class="btn-txt">
          <div class="btn-title">Source Code</div>
          <div class="btn-desc">View the project on GitHub</div>
        </div>
      </a>
    </div>

    <p class="foot">NEXUS-MD &nbsp;·&nbsp; <span>Secure</span> &nbsp;·&nbsp; <span>Encrypted</span> &nbsp;·&nbsp; <span>Fast</span></p>

  </div>

  <script>
    const c = document.getElementById('c');
    const x = c.getContext('2d');
    let W, H, pts = [];

    const resize = () => {
      W = c.width = window.innerWidth;
      H = c.height = window.innerHeight;
    };
    resize();
    window.addEventListener('resize', () => { resize(); pts = []; init(); });

    class P {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.r = Math.random() * 1.2 + .3;
        this.vx = (Math.random() - .5) * .3;
        this.vy = (Math.random() - .5) * .3;
        this.a = Math.random() * .3 + .05;
        const cols = ['rgba(245,158,11,', 'rgba(94,234,212,', 'rgba(167,139,250,'];
        this.col = cols[Math.floor(Math.random() * cols.length)];
      }
      move() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset(); }
      draw() { x.beginPath(); x.arc(this.x, this.y, this.r, 0, Math.PI * 2); x.fillStyle = this.col + this.a + ')'; x.fill(); }
    }

    const init = () => { for (let i = 0; i < 80; i++) pts.push(new P()); };
    init();

    const frame = () => {
      x.clearRect(0, 0, W, H);
      pts.forEach(p => { p.move(); p.draw(); });
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 100) {
            x.beginPath(); x.moveTo(pts[i].x, pts[i].y); x.lineTo(pts[j].x, pts[j].y);
            x.strokeStyle = `rgba(245,158,11,${.05 * (1 - d / 100)})`; x.lineWidth = .5; x.stroke();
          }
        }
      }
      requestAnimationFrame(frame);
    };
    frame();

    const anim = (el, to, ms, suf) => {
      suf = suf || '';
      const s = performance.now();
      const go = t => {
        const p = Math.min((t - s) / ms, 1), e = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.floor(e * to).toLocaleString() + suf;
        if (p < 1) requestAnimationFrame(go);
      };
      requestAnimationFrame(go);
    };

    const load = async () => {
      try {
        const d = await (await fetch('/api/stats')).json();
        anim(document.getElementById('s1'), d.totalPairings, 2000);
        anim(document.getElementById('s2'), d.todayPairings, 1500);
        anim(document.getElementById('s3'), parseFloat(d.successRate), 1800, '%');
        anim(document.getElementById('s4'), d.countriesServed, 1600);
        document.getElementById('srv').textContent = d.serverStatus === 'operational' ? 'All Systems Online' : 'Maintenance';
      } catch (_) {}
    };

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
