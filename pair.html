<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS-MD | Pair Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #080E1A;
      font-family: 'Inter', sans-serif;
      color: #C8D8E8;
      overflow-x: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .back {
      position: fixed;
      top: 20px; left: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      color: rgba(200,216,232,0.6);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all .25s;
    }

    .back:hover {
      background: rgba(245,158,11,0.07);
      border-color: rgba(245,158,11,0.3);
      color: #F59E0B;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem 2rem;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      overflow: hidden;
    }

    .card-top {
      padding: 2.5rem 2rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }

    .card-icon {
      width: 60px; height: 60px;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.15);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #F59E0B;
      margin: 0 auto 1.2rem;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 3px;
      color: #fff;
      margin-bottom: 0.3rem;
    }

    .card-sub {
      font-size: 0.75rem;
      color: rgba(200,216,232,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .steps {
      display: flex;
      align-items: center;
      padding: 1.5rem 2rem;
      background: rgba(0,0,0,0.2);
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .snum {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      color: rgba(200,216,232,0.3);
      transition: all .4s ease;
    }

    .step.on .snum {
      border-color: #F59E0B;
      background: rgba(245,158,11,0.1);
      color: #F59E0B;
      box-shadow: 0 0 12px rgba(245,158,11,0.2);
    }

    .step.ok .snum {
      border-color: #22C55E;
      background: #22C55E;
      color: #fff;
      font-size: 0.65rem;
    }

    .slbl {
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(200,216,232,0.25);
      transition: color .3s;
    }

    .step.on .slbl, .step.ok .slbl { color: #F59E0B; }

    .sline {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 0 8px;
      margin-bottom: 17px;
      transition: background .5s;
      min-width: 30px;
    }

    .sline.on { background: linear-gradient(90deg, #F59E0B, #5EEAD4); }

    .card-body { padding: 2rem; }

    .field-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(200,216,232,0.4);
      margin-bottom: 0.7rem;
    }

    .field {
      display: flex;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0,0,0,0.25);
      transition: border-color .25s, box-shadow .25s;
    }

    .field:focus-within {
      border-color: rgba(245,158,11,0.4);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.06);
    }

    .field-pre {
      padding: 0 1rem;
      display: flex;
      align-items: center;
      background: rgba(245,158,11,0.05);
      border-right: 1px solid rgba(255,255,255,0.07);
      color: #F59E0B;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .field input {
      flex: 1;
      padding: 0.95rem 1rem;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1.5px;
      outline: none;
    }

    .field input::placeholder {
      color: rgba(200,216,232,0.2);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    .go-btn {
      width: 100%;
      margin-top: 1rem;
      padding: 1rem;
      background: #F59E0B;
      border: none;
      border-radius: 12px;
      color: #0A0D14;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .3s ease;
      position: relative;
      overflow: hidden;
    }

    .go-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }

    .go-btn:hover::before { transform: translateX(100%); }

    .go-btn:hover {
      background: #FBBF24;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(245,158,11,0.3);
    }

    .go-btn:active { transform: translateY(0) scale(.98); }

    .go-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #loader {
      display: none;
      margin-top: 1.2rem;
      padding: 0.9rem 1.1rem;
      background: rgba(94,234,212,0.05);
      border: 1px solid rgba(94,234,212,0.12);
      border-radius: 10px;
      font-size: 0.82rem;
      color: rgba(200,216,232,0.6);
    }

    .ld-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 0.8rem;
    }

    .dots span {
      display: inline-block;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #5EEAD4;
      animation: bob 1.4s infinite;
      margin-right: 3px;
    }

    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes bob {
      0%,80%,100% { transform: scale(.6); opacity: .4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .pbar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .pfill {
      height: 100%; width: 0;
      background: linear-gradient(90deg, #F59E0B, #5EEAD4);
      animation: fill 25s ease-out forwards;
    }

    @keyframes fill {
      0%{width:0%} 30%{width:40%} 60%{width:65%} 80%{width:80%} 100%{width:95%}
    }

    #result { margin-top: 1rem; }

    .code-card {
      padding: 1.5rem;
      background: rgba(245,158,11,0.05);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 14px;
      cursor: pointer;
      transition: all .3s;
      animation: up .4s cubic-bezier(.23,1,.32,1);
      text-align: center;
    }

    @keyframes up {
      from { opacity:0; transform: translateY(10px); }
      to { opacity:1; transform: translateY(0); }
    }

    .code-card:hover {
      border-color: rgba(245,158,11,0.5);
      background: rgba(245,158,11,0.08);
    }

    .code-pre {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(200,216,232,0.35);
      margin-bottom: 0.6rem;
    }

    .code-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8rem;
      font-weight: 700;
      color: #F59E0B;
      letter-spacing: 8px;
      animation: glow 2.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% { text-shadow: 0 0 12px rgba(245,158,11,0.4); }
      50% { text-shadow: 0 0 24px rgba(245,158,11,0.8), 0 0 48px rgba(245,158,11,0.2); }
    }

    .code-hint {
      margin-top: 0.7rem;
      font-size: 0.65rem;
      color: rgba(200,216,232,0.3);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .copied {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 50px;
      font-size: 0.6rem;
      color: #22C55E;
      letter-spacing: 1px;
      animation: up .3s ease;
    }

    .err {
      color: #EF4444;
      font-size: 0.82rem;
      font-weight: 500;
      padding: 0.8rem 1rem;
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 10px;
      animation: up .3s ease;
    }

    @media (max-width: 500px) {
      .card { border-radius: 16px; }
      .card-top { padding: 2rem 1.5rem 1.5rem; }
      .card-body { padding: 1.5rem; }
      .steps { padding: 1.2rem 1.5rem; }
      .code-val { font-size: 1.4rem; letter-spacing: 5px; }
      .back { top: 12px; left: 12px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <a href="/" class="back"><i class="fas fa-arrow-left"></i> Back</a>

  <div class="wrap">
    <div class="card">

      <div class="card-top">
        <div class="card-icon"><i class="fas fa-link"></i></div>
        <div class="card-title">PAIR CODE</div>
        <div class="card-sub">NEXUS-MD Session</div>
      </div>

      <div class="steps">
        <div class="step on" id="s1">
          <div class="snum">1</div>
          <span class="slbl">Number</span>
        </div>
        <div class="sline" id="l1"></div>
        <div class="step" id="s2">
          <div class="snum">2</div>
          <span class="slbl">Generate</span>
        </div>
        <div class="sline" id="l2"></div>
        <div class="step" id="s3">
          <div class="snum">3</div>
          <span class="slbl">Pair</span>
        </div>
      </div>

      <div class="card-body">
        <div class="field-label">WhatsApp number with country code</div>
        <div class="field">
          <div class="field-pre">+</div>
          <input id="num" type="number" placeholder="e.g. 254792021944">
        </div>
        <button class="go-btn" id="btn">
          <i class="fas fa-bolt"></i> &nbsp; Generate Pair Code
        </button>
        <div id="loader">
          <div class="ld-row">
            <div class="dots"><span></span><span></span><span></span></div>
            <span>Connecting to WhatsApp...</span>
          </div>
          <div class="pbar"><div class="pfill" id="pf"></div></div>
        </div>
        <div id="result"></div>
      </div>

    </div>
  </div>

  <script>
    const c = document.getElementById('c');
    const x = c.getContext('2d');
    let W, H, pts = [];

    const resize = () => { W = c.width = window.innerWidth; H = c.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', () => { resize(); pts = []; init(); });

    class P {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * W; this.y = Math.random() * H;
        this.r = Math.random() * 1.2 + .3;
        this.vx = (Math.random() - .5) * .3; this.vy = (Math.random() - .5) * .3;
        this.a = Math.random() * .3 + .05;
        this.col = ['rgba(245,158,11,', 'rgba(94,234,212,', 'rgba(167,139,250,'][Math.floor(Math.random() * 3)];
      }
      move() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > W || this.y < 0 || this.y > H) this.reset(); }
      draw() { x.beginPath(); x.arc(this.x, this.y, this.r, 0, Math.PI * 2); x.fillStyle = this.col + this.a + ')'; x.fill(); }
    }

    const init = () => { for (let i = 0; i < 80; i++) pts.push(new P()); };
    init();

    const frame = () => {
      x.clearRect(0, 0, W, H);
      pts.forEach(p => { p.move(); p.draw(); });
      for (let i = 0; i < pts.length; i++) for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y, d = Math.sqrt(dx*dx+dy*dy);
        if (d < 100) { x.beginPath(); x.moveTo(pts[i].x, pts[i].y); x.lineTo(pts[j].x, pts[j].y); x.strokeStyle=`rgba(245,158,11,${.05*(1-d/100)})`; x.lineWidth=.5; x.stroke(); }
      }
      requestAnimationFrame(frame);
    };
    frame();

    const setStep = n => {
      [1,2,3].forEach(i => {
        const el = document.getElementById('s'+i);
        el.classList.remove('on','ok');
        if (i < n) el.classList.add('ok'), el.querySelector('.snum').innerHTML = '<i class="fas fa-check" style="font-size:.55rem"></i>';
        else if (i === n) el.classList.add('on');
      });
      [1,2].forEach(i => {
        const el = document.getElementById('l'+i);
        i < n ? el.classList.add('on') : el.classList.remove('on');
      });
    };

    const btn = document.getElementById('btn');
    const loader = document.getElementById('loader');
    const result = document.getElementById('result');

    btn.addEventListener('click', async () => {
      const num = document.getElementById('num').value.trim();
      if (!num) return;

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> &nbsp; Connecting...';
      loader.style.display = 'block';
      result.innerHTML = '';

      const pf = document.getElementById('pf');
      pf.style.animation = 'none'; pf.offsetHeight;
      pf.style.animation = '';

      setStep(2);

      try {
        const data = await (await fetch('/code?number=' + encodeURIComponent(num))).json();
        loader.style.display = 'none';

        if (data.code) {
          setStep(3);
          result.innerHTML = `
            <div class="code-card" onclick="copy('${data.code}')">
              <div class="code-pre">Your Pairing Code</div>
              <div class="code-val">${data.code}</div>
              <div class="code-hint" id="hint"><i class="fas fa-copy"></i> &nbsp; Tap to copy</div>
            </div>`;
        } else {
          setStep(1);
          result.innerHTML = `<div class="err"><i class="fas fa-exclamation-circle"></i> &nbsp; ${data.code || 'Service unavailable — please try again'}</div>`;
        }
      } catch (_) {
        setStep(1);
        loader.style.display = 'none';
        result.innerHTML = `<div class="err"><i class="fas fa-exclamation-circle"></i> &nbsp; Connection error — please retry</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-bolt"></i> &nbsp; Generate Pair Code';
      }
    });

    const copy = code => {
      navigator.clipboard.writeText(code).then(() => {
        const h = document.getElementById('hint');
        if (h) h.innerHTML = '<span class="copied"><i class="fas fa-check"></i> Copied!</span>';
      });
    };
  </script>
</body>
</html>
